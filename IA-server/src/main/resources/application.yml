server:
  port: 8123
  servlet:
    context-path: /api

spring:
  application:
    name: intelligent-agriculture-server
  datasource:
    url: jdbc:mysql://localhost:3306/agriculture?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: AgricultureHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  data:
    redis:
      database: 0
      host: 127.0.0.1
      port: 6379
      timeout: 5000
  profiles:
    active: local

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.agriculture.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true
  openapi:
    version: v1.0
  group:
    test1:
      api-rule: package
      api-rule-resources:
        - com.agriculture.controller

# 日志配置
logging:
  level:
    com.agriculture: DEBUG

cache:
  environment:
    local:
      max-size: 1000
      ttl-seconds: 30
    redis:
      ttl-seconds: 120
