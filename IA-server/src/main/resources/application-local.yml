server:
  port: ${SERVER_PORT:8123}
  servlet:
    context-path: /api

spring:
  application:
    name: intelligent-agriculture-server

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/agriculture?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8}
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: AgricultureHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  data:
    redis:
      database: ${REDIS_DATABASE:0}
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.agriculture.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true
  openapi:
    version: v1.0
  group:
    test1:
      api-rule: package
      api-rule-resources:
        - com.agriculture.controller
        - com.agriculture.ai

logging:
  level:
    com.agriculture: DEBUG
    dev.langchain4j: DEBUG

cache:
  environment:
    local:
      max-size: 1000
      ttl-seconds: 30
    redis:
      ttl-seconds: 120

langchain4j:
  open-ai:
    streaming-chat-model:
      api-key: ${AI_API_KEY:}
      base-url: ${AI_BASE_URL:https://api-inference.modelscope.cn/v1}
      model-name: ${AI_MODEL_NAME:moonshotai/Kimi-K2.5}

iaai:
  base-url: ${IAAI_BASE_URL:http://localhost:8000}

weather:
  qweather:
    api-key: ${WEATHER_API_KEY:}
    api-host: ${WEATHER_API_HOST:m66r6yk5c4.re.qweatherapi.com}
